<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription — VibeZone</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="logo">VIBE<span>ZONE</span></a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="events.html">Événements</a>
    </div>
    <div class="nav-actions"></div>
    <button class="burger" onclick="toggleMenu()">☰</button>
  </nav>

  <div class="form-page">
    <div class="form-card">
      <h2>INSCRIPTION</h2>
      <p class="sub">Rejoins 18 000 membres qui ne s'ennuient plus. 🎉</p>
      
      <div class="form-error" id="error"></div>
      <div class="form-success" id="success">Compte créé ! Redirection...</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="firstname" placeholder="Sophie"/>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="lastname" placeholder="Martin"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="toi@example.com"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="Min. 6 caractères"/>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirm" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label>Ville</label>
        <input type="text" id="city" placeholder="Paris"/>
      </div>

      <div style="margin:4px 0 20px;display:flex;align-items:flex-start;gap:10px">
        <input type="checkbox" id="terms" style="margin-top:3px;accent-color:var(--accent)"/>
        <label for="terms" style="font-size:13px;color:var(--text2)">J'accepte les <a href="#" style="color:var(--accent)">conditions d'utilisation</a> et la politique de confidentialité</label>
      </div>

      <button class="btn-primary form-submit" onclick="register()">Créer mon compte</button>

      <div class="form-footer">
        Déjà membre ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    function register() {
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.style.display = 'none';

      const firstname = document.getElementById('firstname').value.trim();
      const lastname = document.getElementById('lastname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const city = document.getElementById('city').value.trim();
      const terms = document.getElementById('terms').checked;

      if (!firstname || !lastname || !email || !password || !city) {
        error.textContent = 'Merci de remplir tous les champs.'; error.style.display = 'block'; return;
      }
      if (password.length < 6) {
        error.textContent = 'Le mot de passe doit faire au moins 6 caractères.'; error.style.display = 'block'; return;
      }
      if (password !== confirm) {
        error.textContent = 'Les mots de passe ne correspondent pas.'; error.style.display = 'block'; return;
      }
      if (!terms) {
        error.textContent = 'Accepte les conditions pour continuer.'; error.style.display = 'block'; return;
      }

      // Check if email exists
      const existing = getAllUsers().find(u => u.email === email);
      const regUsers = JSON.parse(localStorage.getItem('vz_registered') || '[]');
      if (existing || regUsers.find(u => u.email === email)) {
        error.textContent = 'Cet email est déjà utilisé.'; error.style.display = 'block'; return;
      }

      const newUser = {
        id: Date.now(),
        name: firstname + ' ' + lastname,
        email,
        password,
        role: 'user',
        city,
        joined: new Date().toISOString().split('T')[0],
        saved: [],
        status: 'active'
      };

      regUsers.push(newUser);
      localStorage.setItem('vz_registered', JSON.stringify(regUsers));

      const { password: _, ...safeUser } = newUser;
      localStorage.setItem('vz_current_user', JSON.stringify(safeUser));

      success.style.display = 'block';
      setTimeout(() => window.location.href = 'index.html', 1200);
    }

    function toggleMenu() {
      document.querySelector('.nav-links').classList.toggle('mobile-open');
    }
  </script>
</body>
</html>
