<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — VibeZone</title>
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    .admin-badge { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: var(--accent); padding: 10px 20px; border-radius: 8px; text-align: center; font-family: var(--font-mono); font-size: 12px; margin-bottom: 28px; letter-spacing: 0.08em; }
    .lock-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <div class="lock-icon">🔐</div>
      <h2>ADMIN</h2>
      <p class="sub">Accès réservé aux administrateurs.</p>
      <div class="admin-badge">⚠ ESPACE SÉCURISÉ — ACCÈS RESTREINT</div>

      <div class="form-error" id="error">Identifiants incorrects.</div>
      <div class="form-success" id="success">Accès autorisé. Redirection...</div>

      <div class="form-group">
        <label>Email Admin</label>
        <input type="email" id="email" placeholder="Email..."  onkeydown="if(event.key==='Enter')adminLogin()"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••"  onkeydown="if(event.key==='Enter')adminLogin()"/>
      </div>

      <button class="btn-primary form-submit" onclick="adminLogin()">🔓 Accéder au panel</button>

      <div class="form-footer" style="margin-top:16px">
        <a href="../index.html" style="color:var(--text3)">← Retour au site public</a>
      </div>

      <div style="margin-top:20px;padding:12px;background:var(--bg2);border-radius:10px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">
        <strong style="color:var(--text2)">DEMO:</strong> admin@vibezone.fr / admin2024
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script>
    function adminLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.style.display = 'none';

      if (email === 'admin@vibezone.mg' && pass === 'admin2024') {
        const admin = { id: 99, name: 'Admin VibeZone', email, role: 'admin', joined: '2024-01-01', saved: [] };
        localStorage.setItem('vz_current_user', JSON.stringify(admin));
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        error.style.display = 'block';
      }
    }
  </script>
</body>
</html>
