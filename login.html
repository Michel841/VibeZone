<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — VibeZone</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="logo">VIBE<span>ZONE</span></a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="events.html">Événements</a>
    </div>
    <div class="nav-actions"></div>
    <button class="burger" onclick="toggleMenu()">☰</button>
  </nav>

  <div class="form-page">
    <div class="form-card">
      <h2>CONNEXION</h2>
      <p class="sub">Bon retour dans la zone ! 🔥</p>
      
      <div class="form-error" id="error">Email ou mot de passe incorrect.</div>
      <div class="form-success" id="success">Connexion réussie ! Redirection...</div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="toi@example.com" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      
      <div style="text-align:right;margin:-8px 0 20px">
        <a href="#" style="font-size:13px;color:var(--text3)">Mot de passe oublié ?</a>
      </div>

      <button class="btn-primary form-submit" onclick="login()">Se connecter</button>

      <div class="form-footer">
        Pas encore membre ? <a href="register.html">Créer un compte</a>
      </div>
      
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
        <p style="font-size:12px;color:var(--text3);font-family:var(--font-mono);text-align:center;margin-bottom:12px">COMPTES DE DEMO</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button onclick="fillDemo('sophie@example.com','password123')" class="btn-outline" style="font-size:12px;padding:8px 12px">👤 User demo</button>
          <button onclick="fillDemo('admin@vibezone.mg','admin2024')" class="btn-outline" style="font-size:12px;padding:8px 12px">⚙️ Admin demo</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Demo admin account
    const ADMIN_ACCOUNT = { id: 99, name: 'Admin VibeZone', email: 'admin@vibezone.mg', role: 'admin', joined: '2024-01-01', saved: [] };
    const DEMO_USERS = getAllUsers();

    function fillDemo(email, pass) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = pass;
    }

    function login() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.style.display = 'none';

      if (!email || !pass) { error.textContent = 'Remplis tous les champs.'; error.style.display = 'block'; return; }

      // Admin check
      if (email === 'admin@vibezone.mg' && pass === 'admin2024') {
        localStorage.setItem('vz_current_user', JSON.stringify(ADMIN_ACCOUNT));
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'admin/dashboard.html', 1000);
        return;
      }

      // User check (any user with password "password123" for demo)
      const users = getAllUsers();
      const user = users.find(u => u.email === email);
      if (user && pass === 'password123') {
        localStorage.setItem('vz_current_user', JSON.stringify(user));
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 1000);
        return;
      }

      // Check registered users
      const regUsers = JSON.parse(localStorage.getItem('vz_registered') || '[]');
      const regUser = regUsers.find(u => u.email === email && u.password === pass);
      if (regUser) {
        const { password, ...safeUser } = regUser;
        localStorage.setItem('vz_current_user', JSON.stringify(safeUser));
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 1000);
        return;
      }

      error.textContent = 'Email ou mot de passe incorrect.';
      error.style.display = 'block';
    }

    function toggleMenu() {
      document.querySelector('.nav-links').classList.toggle('mobile-open');
    }
  </script>
</body>
</html>
